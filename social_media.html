<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zealcorps Social Links</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a, #111827);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 760px;
      padding: 24px;
    }

    .platform-list {
      display: grid;
      gap: 18px;
    }

    .platform-link {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      border-radius: 36px;
      padding: 28px 32px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 26px;
      text-decoration: none;
      transition: 0.25s ease;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .platform-link:hover,
    .platform-link:focus {
      transform: translateY(-2px);
      border-color: rgba(34, 211, 238, 0.95);
      background: rgba(34, 211, 238, 0.14);
      box-shadow: 0 20px 60px rgba(34, 211, 238, 0.16);
      outline: none;
    }

    .platform-link:hover .icon-box,
    .platform-link:focus .icon-box {
      background: #22d3ee;
      color: #020617;
    }

    .icon-box {
      min-width: 98px;
      width: 98px;
      height: 98px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.11);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 700;
      line-height: 1;
      transition: 0.25s ease;
    }

    .platform-name {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .platform-subtitle {
      color: #a8b3c7;
      font-size: 24px;
      line-height: 1.25;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
      }

      .page {
        padding: 18px;
        padding-top: 28px;
      }

      .platform-list {
        gap: 16px;
      }

      .platform-link {
        border-radius: 30px;
        padding: 22px;
        gap: 18px;
      }

      .icon-box {
        min-width: 72px;
        width: 72px;
        height: 72px;
        border-radius: 22px;
        font-size: 34px;
      }

      .platform-name {
        font-size: 26px;
        margin-bottom: 8px;
      }

      .platform-subtitle {
        font-size: 18px;
      }
    }

    @media (max-width: 380px) {
      .platform-link {
        padding: 18px;
        gap: 14px;
      }

      .icon-box {
        min-width: 62px;
        width: 62px;
        height: 62px;
        font-size: 26px;
      }

      .platform-name {
        font-size: 23px;
      }

      .platform-subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="platform-list" aria-label="Zealcorps social and website links">
      <a class="platform-link" href="https://www.linkedin.com/company/zealcorps" target="_blank" rel="noopener noreferrer">
        <div class="icon-box">in</div>
        <div>
          <div class="platform-name">LinkedIn</div>
          <div class="platform-subtitle">Professional outreach</div>
        </div>
      </a>

      <a class="platform-link" href="https://www.facebook.com/zealcorps/" target="_blank" rel="noopener noreferrer">
        <div class="icon-box">f</div>
        <div>
          <div class="platform-name">Facebook</div>
          <div class="platform-subtitle">Community engagement</div>
        </div>
      </a>

      <a class="platform-link" href="https://www.zealcorps.com/" target="_blank" rel="noopener noreferrer">
        <div class="icon-box">www</div>
        <div>
          <div class="platform-name">Company Website</div>
          <div class="platform-subtitle">Visit Zealcorps online</div>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
