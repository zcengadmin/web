<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect CreatiVintel</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a, #111827);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 760px;
      padding: 24px;
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
      color: #ffffff;
    }

    .platform-list {
      display: grid;
      gap: 18px;
    }

    .platform-link {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      border-radius: 36px;
      padding: 28px 32px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 26px;
      text-decoration: none;
      transition: 0.25s ease;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .platform-link:hover,
    .platform-link:focus {
      transform: translateY(-2px);
      border-color: rgba(34, 211, 238, 0.95);
      background: rgba(34, 211, 238, 0.14);
      box-shadow: 0 20px 60px rgba(34, 211, 238, 0.16);
      outline: none;
    }

    .platform-link:hover .icon-box,
    .platform-link:focus .icon-box {
      transform: scale(1.04);
    }

    .icon-box {
      min-width: 98px;
      width: 98px;
      height: 98px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.11);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s ease;
      overflow: hidden;
    }

    .icon-box svg {
      width: 62px;
      height: 62px;
      display: block;
    }

    .platform-name {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .platform-subtitle {
      color: #a8b3c7;
      font-size: 24px;
      line-height: 1.25;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
      }

      .page {
        padding: 18px;
        padding-top: 28px;
      }

      .title {
        font-size: 32px;
        margin-bottom: 26px;
      }

      .platform-list {
        gap: 16px;
      }

      .platform-link {
        border-radius: 30px;
        padding: 22px;
        gap: 18px;
      }

      .icon-box {
        min-width: 72px;
        width: 72px;
        height: 72px;
        border-radius: 22px;
      }

      .icon-box svg {
        width: 46px;
        height: 46px;
      }

      .platform-name {
        font-size: 26px;
        margin-bottom: 8px;
      }

      .platform-subtitle {
        font-size: 18px;
      }
    }

    @media (max-width: 380px) {
      .platform-link {
        padding: 18px;
        gap: 14px;
      }

      .icon-box {
        min-width: 62px;
        width: 62px;
        height: 62px;
      }

      .icon-box svg {
        width: 40px;
        height: 40px;
      }

      .platform-name {
        font-size: 23px;
      }

      .platform-subtitle {
        font-size: 16px;
      }

      .title {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="title">Connect CreatiVintel</h1>

    <section class="platform-list" aria-label="CreatiVintel social links">

      <a class="platform-link" href="https://www.instagram.com/creativintel/" target="_blank" rel="noopener noreferrer">
        <div class="icon-box" aria-hidden="true">
          <!-- Embedded Instagram Logo -->
          <svg viewBox="0 0 48 48" role="img" aria-label="Instagram logo">
            <defs>
              <radialGradient id="instaGradient" cx="30%" cy="107%" r="150%">
                <stop offset="0%" stop-color="#fdf497"/>
                <stop offset="5%" stop-color="#fdf497"/>
                <stop offset="45%" stop-color="#fd5949"/>
                <stop offset="60%" stop-color="#d6249f"/>
                <stop offset="90%" stop-color="#285AEB"/>
              </radialGradient>
            </defs>
            <rect x="4" y="4" width="40" height="40" rx="11" fill="url(#instaGradient)"/>
            <circle cx="24" cy="24" r="9" fill="none" stroke="#ffffff" stroke-width="3.6"/>
            <circle cx="35" cy="13" r="2.7" fill="#ffffff"/>
            <rect x="13" y="13" width="22" height="22" rx="7" fill="none" stroke="#ffffff" stroke-width="3.2"/>
          </svg>
        </div>
        <div>
          <div class="platform-name">Instagram</div>
          <div class="platform-subtitle">Creative updates and visuals</div>
        </div>
      </a>

      <a class="platform-link" href="https://www.facebook.com/people/CreatiVintel/61591248560791/" target="_blank" rel="noopener noreferrer">
        <div class="icon-box" aria-hidden="true">
          <!-- Embedded Facebook Logo -->
          <svg viewBox="0 0 48 48" role="img" aria-label="Facebook logo">
            <circle cx="24" cy="24" r="22" fill="#1877F2"/>
            <path 
              fill="#ffffff" 
              d="M29.8 25.4l0.9-5.7h-5.5v-3.7c0-1.6 0.8-3.1 3.2-3.1h2.5V8.1s-2.3-0.4-4.5-0.4c-4.6 0-7.6 2.8-7.6 7.9v4.1h-5.1v5.7h5.1v13.8c1 0.2 2.1 0.3 3.2 0.3s2.2-0.1 3.2-0.3V25.4h4.6z"
            />
          </svg>
        </div>
        <div>
          <div class="platform-name">Facebook</div>
          <div class="platform-subtitle">Community engagement</div>
        </div>
      </a>

      <a class="platform-link" href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer">
        <div class="icon-box" aria-hidden="true">
          <!-- Embedded LinkedIn Logo -->
          <svg viewBox="0 0 48 48" role="img" aria-label="LinkedIn logo">
            <rect x="5" y="5" width="38" height="38" rx="6" fill="#0A66C2"/>
            <path 
              fill="#ffffff" 
              d="M15.2 20.3h5.1v16.1h-5.1V20.3zM17.8 12.3c1.6 0 2.9 1.3 2.9 2.9s-1.3 2.9-2.9 2.9-2.9-1.3-2.9-2.9 1.3-2.9 2.9-2.9zM23.5 20.3h4.9v2.2h0.1c0.7-1.3 2.4-2.7 4.9-2.7 5.2 0 6.2 3.4 6.2 7.9v8.7h-5.1v-7.7c0-1.8 0-4.2-2.6-4.2s-3 2-3 4.1v7.8h-5.1V20.3h-0.3z"
            />
          </svg>
        </div>
        <div>
          <div class="platform-name">LinkedIn</div>
          <div class="platform-subtitle">Professional network</div>
        </div>
      </a>

    </section>
  </main>
</body>
</html>
